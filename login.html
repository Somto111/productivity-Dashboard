<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Productivity Dashboard</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Quicksand"', 'ui-sans-serif', 'system-ui'],
                    },
                },
            },
        }
    </script>
    
    <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        .gradient-bg {
            background: linear-gradient(135deg, #000000 0%, #1a0033 50%, #000000 100%);
        }
    </style>
</head>
<body class="font-sans gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md animate-fade-in">
        <!-- Login/Signup Card -->
        <div class="bg-gradient-to-b from-neutral-900 to-neutral-950 rounded-2xl p-8 border border-gray-800 shadow-2xl group relative overflow-hidden">
            <div class="absolute top-0 left-0 h-[4px] w-full rounded-t-2xl bg-gradient-to-r from-purple-600 to-purple-400"></div>
            
            <!-- Logo/Title -->
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto mb-4 bg-gradient-to-br from-purple-600 to-purple-800 rounded-2xl flex items-center justify-center transform group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                </div>
                <h1 id="formTitle" class="text-3xl font-bold mb-2 bg-gradient-to-r from-purple-600 to-purple-400 bg-clip-text text-transparent">
                    Welcome Back
                </h1>
                <p id="formSubtitle" class="text-gray-400">
                    to your dashboard
                </p>
            </div>
            
            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                    <input type="email" id="loginEmail" required
                        class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                        placeholder="your@email.com">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
                    <input type="password" id="loginPassword" required
                        class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>
                
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center text-gray-400 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded border-gray-600 text-purple-600 focus:ring-purple-600 focus:ring-offset-0 bg-neutral-800">
                        <span class="ml-2">Remember me</span>
                    </label>
                    <a href="#" class="text-purple-400 hover:text-purple-300 transition-colors">Forgot password?</a>
                </div>
                
                <button type="submit" 
                    class="w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-semibold py-3 rounded-lg transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-purple-600/50">
                    Sign In
                </button>
            </form>
            
            <!-- Signup Form (Hidden by default) -->
            <form id="signupForm" class="space-y-4 hidden">
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Full Name</label>
                    <input type="text" id="signupName" required
                        class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                        placeholder="John Doe">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Email</label>
                    <input type="email" id="signupEmail" required
                        class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                        placeholder="your@email.com">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Password</label>
                    <input type="password" id="signupPassword" required
                        class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-gray-300 mb-2">Confirm Password</label>
                    <input type="password" id="signupConfirmPassword" required
                        class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 text-white placeholder:text-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>
                
                <button type="submit"
                    class="w-full bg-gradient-to-r from-purple-600 to-purple-700 hover:from-purple-700 hover:to-purple-800 text-white font-semibold py-3 rounded-lg transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-purple-600/50">
                    Create Account
                </button>
            </form>
            
            <!-- Toggle Form -->
            <div class="mt-6 text-center">
                <p class="text-gray-400">
                    <span id="toggleText">Don't have an account?</span>
                    <button type="button" id="toggleBtn" class="text-purple-400 hover:text-purple-300 font-semibold ml-1 transition-colors">
                        Sign Up
                    </button>
                </p>
            </div>
        </div>
        
        <!-- Footer -->
        <p class="text-center text-gray-500 text-sm mt-6">
            © 2024 Productivity Dashboard. All rights reserved.
        </p>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const toggleBtn = document.getElementById('toggleBtn');
        const toggleText = document.getElementById('toggleText');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        
        let isLoginMode = true;
        
        // Toggle between login and signup
        toggleBtn.addEventListener('click', function() {
            isLoginMode = !isLoginMode;
            
            if (isLoginMode) {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'to your dashboard';
                toggleText.textContent = "Don't have an account?";
                toggleBtn.textContent = 'Sign Up';
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                formTitle.textContent = 'Welcome';
                formSubtitle.textContent = 'to Productivity Dashboard';
                toggleText.textContent = 'Already have an account?';
                toggleBtn.textContent = 'Sign In';
            }
        });
        
        // Handle login
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Store user session
            const user = {
                email: email,
                name: email.split('@')[0],
                loggedIn: true,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('userSession', JSON.stringify(user));
            localStorage.setItem('userProfile', JSON.stringify({
                name: user.name,
                email: email,
                dailyGoal: 5
            }));
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
        
        // Handle signup
        signupForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match!');
                return;
            }
            
            // Store user session
            const user = {
                email: email,
                name: name,
                loggedIn: true,
                loginTime: new Date().toISOString()
            };
            
            localStorage.setItem('userSession', JSON.stringify(user));
            localStorage.setItem('userProfile', JSON.stringify({
                name: name,
                email: email,
                dailyGoal: 5
            }));
            
            // Redirect to dashboard
            window.location.href = 'dashboard.html';
        });
        
        // Check if already logged in
        window.addEventListener('load', function() {
            const session = localStorage.getItem('userSession');
            if (session) {
                const user = JSON.parse(session);
                if (user.loggedIn) {
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
