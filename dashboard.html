<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your productivity with tasks, focus timer, analytics, and progress tracking">
    <title>Productivity Dashboard - Track Your Progress</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="login.html">
    
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Quicksand"', 'ui-sans-serif', 'system-ui'],
                    },
                },
            },
        }
    </script>
    
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #171717;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #7c3aed;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #6d28d9;
        }
        
        * {
            transition-property: background-color, border-color, color, fill, stroke, opacity, box-shadow, transform;
            transition-duration: 200ms;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.5s ease-out;
        }


        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .dropdown-menu {
            animation: slideDown 0.2s ease-out;
        }
    </style>
</head>
<body class="font-sans bg-black text-white min-h-screen">
    <div class="bg-black min-h-screen">
        <!-- Navigation -->
        <nav class="flex justify-between items-center p-6 border-b border-gray-800 bg-gradient-to-b from-neutral-900 to-black">
            <h1 class="hover:text-purple-600 font-bold text-2xl cursor-pointer transition-colors">
                Productivity Dashboard
            </h1>
            
            <ul class="hidden md:flex gap-8">
                <li class="hover:text-purple-600 font-semibold cursor-pointer">Home</li>
                <li class="hover:text-purple-600 font-semibold cursor-pointer">Analytics</li>
                <li class="hover:text-purple-600 font-semibold cursor-pointer">Settings</li>
            </ul>
            
            <!-- User Profile Dropdown -->
            <div class="relative">
                <button id="profileBtn" class="flex items-center gap-3 hover:bg-neutral-900 p-2 rounded-lg transition-colors">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-600 to-purple-800 flex items-center justify-center font-bold" id="profileAvatar">
                        U
                    </div>
                    <div class="hidden sm:block text-left">
                        <p class="text-sm font-semibold" id="userName">User</p>
                        <p class="text-xs text-gray-400">View Profile</p>
                    </div>
                    <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                
                <!-- Dropdown Menu -->
                <div id="profileDropdown" class="hidden absolute right-0 mt-2 w-64 bg-neutral-900 border border-gray-800 rounded-xl shadow-2xl z-50 dropdown-menu">
                    <div class="p-4 border-b border-gray-800">
                        <p class="font-semibold" id="dropdownName">User</p>
                        <p class="text-sm text-gray-400" id="dropdownEmail">user@example.com</p>
                    </div>
                    <div class="p-2">
                        <button onclick="openProfileModal()" class="w-full text-left px-4 py-2 hover:bg-neutral-800 rounded-lg flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                            Edit Profile
                        </button>
                        <button onclick="clearAllData()" class="w-full text-left px-4 py-2 hover:bg-neutral-800 rounded-lg flex items-center gap-2 text-red-400">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                            Clear All Data
                        </button>
                    </div>
                </div>
            </div>
        </nav>

        <div id="profileModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
            <div class="bg-gradient-to-b from-neutral-900 to-neutral-950 rounded-2xl p-8 max-w-md w-full border border-gray-800 shadow-2xl">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Edit Profile</h2>
                    <button onclick="closeProfileModal()" class="text-gray-400 hover:text-white">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2">Name</label>
                        <input type="text" id="profileNameInput" placeholder="Enter your name" 
                            class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-2">Email</label>
                        <input type="email" id="profileEmailInput" placeholder="Enter your email" 
                            class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-semibold mb-2">Daily Goal (tasks)</label>
                        <input type="number" id="profileGoalInput" placeholder="5" min="1" max="50"
                            class="w-full bg-neutral-800 border border-gray-700 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-purple-600">
                    </div>
                    
                    <button onclick="saveProfile()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-semibold py-3 rounded-lg mt-4">
                        Save Profile
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Main Content Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 p-6 max-w-[1600px] mx-auto">
            
            <!-- Tasks Section -->
            <section class="bg-black text-white p-6 rounded-2xl group overflow-hidden relative border border-gray-800 hover:border-purple-500 hover:shadow-[0_15px_15px_rgba(200,85,247,0.1)] bg-gradient-to-b from-neutral-900 to-neutral-950 transition-all duration-300 ease-in-out hover:-translate-y-1">
                <div class="absolute top-0 left-0 h-[4px] w-0 rounded-2xl bg-purple-500 transition-all duration-300 ease-in-out group-hover:w-full"></div>
                
                <h3 class="hover:text-purple-600 text-lg font-semibold mb-5">📋 Today's Tasks</h3>
                
                <div class="max-h-[400px] overflow-y-auto pr-2" id="taskListContainer">
                    <ul id="taskList" class="space-y-2">
                        <!-- Tasks will be added here dynamically -->
                    </ul>
                </div>

                <div class="mt-4 space-y-2">
                    <input type="text" id="taskInput" placeholder="Enter a new task..." 
                        class="w-full bg-neutral-800 p-3 rounded-lg text-white placeholder:text-gray-500 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-600">
                    
                    <div class="flex gap-2">
                        <select id="category" class="flex-1 bg-neutral-800 p-3 rounded-lg text-white border border-gray-600 focus:outline-none focus:ring-2 focus:ring-purple-600">
                            <option value="Low">Low Priority</option>
                            <option value="Medium">Medium Priority</option>
                            <option value="High">High Priority</option>
                        </select>
                        <button onclick="addTask()" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-lg font-medium">
                            ADD
                        </button>
                    </div>
                </div>

                <div class="mt-4 h-2 rounded-full bg-neutral-900 overflow-hidden">
                    <div id="taskProgress" class="h-full bg-gradient-to-r from-purple-600 to-purple-400 transition-all duration-500" style="width: 0%"></div>
                </div>
            </section>

            <!-- Focus Timer Section -->
            <section class="bg-black text-white p-6 rounded-2xl group overflow-hidden relative border border-gray-800 hover:border-purple-500 bg-gradient-to-b from-neutral-900 to-neutral-950 hover:shadow-[0_15px_15px_rgba(200,85,247,0.1)] transition-all duration-300 ease-in-out hover:-translate-y-1">
                <div class="absolute top-0 left-0 h-[4px] w-0 rounded-2xl bg-purple-500 transition-all duration-300 ease-in-out group-hover:w-full"></div>
                
                <h3 class="hover:text-purple-600 text-lg font-semibold mb-5">⏱️ Focus Timer</h3>
                
                <div class="flex gap-2 items-center justify-between bg-neutral-900 p-2 rounded-xl mb-6">
                    <button onclick="changeTime(this); setActive(this)" id="focus" class="tab rounded-lg w-1/3 py-2 text-sm font-medium hover:bg-purple-800">
                        Focus
                    </button>
                    <button onclick="changeTime(this); setActive(this)" id="shortBreak" class="tab rounded-lg w-1/3 py-2 text-sm font-medium hover:bg-purple-800">
                        Short Break
                    </button>
                    <button onclick="changeTime(this); setActive(this)" id="longBreak" class="tab rounded-lg w-1/3 py-2 text-sm font-medium hover:bg-purple-800">
                        Long Break
                    </button>
                </div>
                
                <p id="time" class="text-center p-8 text-6xl font-bold bg-gradient-to-r from-purple-600 to-purple-400 bg-clip-text text-transparent">
                    25:00
                </p>
                
                <div class="flex justify-center gap-3 mt-6">
                    <button onclick="startTimer()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-lg font-medium">
                        Start
                    </button>
                    <button onclick="pauseTimer()" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2 rounded-lg font-medium">
                        Pause
                    </button>
                    <button onclick="resetTimer()" class="bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-medium">
                        Reset
                    </button>
                </div>
            </section>

            <!-- Today's Progress Stats -->
            <section class="bg-black text-white p-6 rounded-xl group relative overflow-hidden border border-gray-800 hover:border-purple-500 bg-gradient-to-b from-neutral-900 to-neutral-950 hover:shadow-[0_15px_15px_rgba(200,85,247,0.1)] transition-all duration-300 ease-in-out hover:-translate-y-1">
                <div class="absolute top-0 left-0 h-[4px] w-0 rounded-2xl bg-purple-500 transition-all duration-300 ease-in-out group-hover:w-full"></div>
                
                <h3 class="hover:text-purple-600 text-lg font-semibold mb-5">📊 Today's Progress</h3>
                
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-neutral-900 text-center p-6 rounded-xl border border-gray-800 hover:border-purple-500 hover:scale-105 transition-all">
                        <p class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-purple-400 bg-clip-text text-transparent" id="tasksCompleted">0</p>
                        <p class="text-sm text-gray-400 mt-2">Tasks Done</p>
                    </div>
                    
                    <div class="bg-neutral-900 text-center p-6 rounded-xl border border-gray-800 hover:border-purple-500 hover:scale-105 transition-all">
                        <p class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-purple-400 bg-clip-text text-transparent" id="focusSessions">0</p>
                        <p class="text-sm text-gray-400 mt-2">Focus Sessions</p>
                    </div>
                    
                    <div class="bg-neutral-900 text-center p-6 rounded-xl border border-gray-800 hover:border-purple-500 hover:scale-105 transition-all">
                        <p class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-purple-400 bg-clip-text text-transparent" id="minutesFocused">0</p>
                        <p class="text-sm text-gray-400 mt-2">Minutes</p>
                    </div>
                    
                    <div class="bg-neutral-900 text-center p-6 rounded-xl border border-gray-800 hover:border-purple-500 hover:scale-105 transition-all">
                        <p class="text-4xl font-bold bg-gradient-to-r from-purple-600 to-purple-400 bg-clip-text text-transparent" id="productivity">0%</p>
                        <p class="text-sm text-gray-400 mt-2">Productivity</p>
                    </div>
                </div>
            </section>

            <!-- Productivity Chart -->
            <section class="lg:col-span-3 bg-black text-white p-6 rounded-xl group relative overflow-hidden border border-gray-800 hover:border-purple-500 bg-gradient-to-b from-neutral-900 to-neutral-950 hover:shadow-[0_15px_15px_rgba(200,85,247,0.1)] transition-all duration-300 ease-in-out hover:-translate-y-1">
                <div class="absolute top-0 left-0 h-[4px] w-0 rounded-2xl bg-purple-500 transition-all duration-300 ease-in-out group-hover:w-full"></div>
                
                <div class="flex justify-between items-center mb-5">
                    <h3 class="hover:text-purple-600 text-lg font-semibold">📈 Productivity Analytics</h3>
                    
                    <div class="flex gap-2">
                        <button onclick="updateChartView('hourly')" class="chart-filter px-4 py-2 bg-purple-600 text-white rounded-lg text-sm font-medium">
                            Hourly
                        </button>
                        <button onclick="updateChartView('daily')" class="chart-filter px-4 py-2 bg-neutral-800 border border-gray-700 rounded-lg text-sm font-medium hover:border-purple-500">
                            Daily
                        </button>
                        <button onclick="updateChartView('weekly')" class="chart-filter px-4 py-2 bg-neutral-800 border border-gray-700 rounded-lg text-sm font-medium hover:border-purple-500">
                            Weekly
                        </button>
                    </div>
                </div>
                
                <div class="relative" style="height: 450px;">
                    <canvas id="productivityChart"></canvas>
                </div>
            </section>

            <!-- Quick Notes -->
            <section class="bg-black bg-gradient-to-b from-neutral-900 to-neutral-950 text-white p-6 rounded-xl overflow-hidden group relative border border-gray-800 hover:border-purple-500 hover:shadow-[0_15px_15px_rgba(200,85,247,0.1)] transition-all ease-in-out duration-300 hover:-translate-y-1">
                <div class="absolute top-0 left-0 h-[4px] w-0 rounded-2xl bg-purple-500 transition-all duration-300 ease-in-out group-hover:w-full"></div>
                
                <h3 class="hover:text-purple-600 text-lg font-semibold mb-4">📝 Quick Notes</h3>
                
                <textarea id="notesArea" placeholder="Jot down your thoughts..." 
                    class="border border-gray-800 focus:border-purple-500 focus:outline-none focus:ring-2 focus:ring-purple-600 p-4 w-full h-64 rounded-xl bg-neutral-900 resize-none">
                </textarea>
            </section>
        </div>
    </div>

    <script>
        let totalSeconds = 1500;
        let timer = null;
        let isRunning = false;
        let currentChartView = 'hourly';
        let chart = null;
        
        let stats = {
            tasksCompleted: 0,
            focusSessions: 0,
            minutesFocused: 0,
            totalTasks: 0
        };

        let productivityData = {
            hourly: [],
            daily: [],
            weekly: []
        };

       
        document.addEventListener('DOMContentLoaded', function() {
            loadProfile();
            loadTasks();
            loadStats();
            loadNotes();
            loadProductivityData();
            initChart();
            updateStats();
            setActive(document.getElementById('focus'));
        });

        
        function loadProfile() {
            const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
            const name = profile.name || 'User';
            const email = profile.email || 'user@example.com';
            
            document.getElementById('userName').textContent = name;
            document.getElementById('dropdownName').textContent = name;
            document.getElementById('dropdownEmail').textContent = email;
            document.getElementById('profileAvatar').textContent = name.charAt(0).toUpperCase();
            
            document.getElementById('profileNameInput').value = name;
            document.getElementById('profileEmailInput').value = email;
            document.getElementById('profileGoalInput').value = profile.dailyGoal || 5;
        }

        function openProfileModal() {
            document.getElementById('profileModal').classList.remove('hidden');
            document.getElementById('profileDropdown').classList.add('hidden');
        }

        function closeProfileModal() {
            document.getElementById('profileModal').classList.add('hidden');
        }

        function saveProfile() {
            const profile = {
                name: document.getElementById('profileNameInput').value || 'User',
                email: document.getElementById('profileEmailInput').value || 'user@example.com',
                dailyGoal: parseInt(document.getElementById('profileGoalInput').value) || 5
            };
            
            localStorage.setItem('userProfile', JSON.stringify(profile));
            loadProfile();
            closeProfileModal();
            
            showNotification('Profile updated successfully!');
        }

        // Profile dropdown toggle
        document.getElementById('profileBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('profileDropdown').classList.toggle('hidden');
        });

        document.addEventListener('click', function() {
            document.getElementById('profileDropdown').classList.add('hidden');
        });

        
        const taskInput = document.getElementById('taskInput');
        taskInput.addEventListener('keypress', function(e) {
            if(e.key === "Enter") {
                addTask();
            }
        });

        function addTask() {
            const category = document.getElementById('category').value;
            const taskText = taskInput.value.trim();
            
            if (taskText === "") {
                showNotification('Please enter a task!', 'error');
                return;
            }
            
            const task = {
                id: Date.now(),
                text: taskText,
                category: category,
                completed: false,
                createdAt: new Date().toISOString()
            };
            
            const tasks = getTasks();
            tasks.push(task);
            saveTasks(tasks);
            renderTasks();
            
            taskInput.value = "";
            updateStats();
            
            showNotification('Task added successfully!');
        }

        function toggleTask(taskId) {
            const tasks = getTasks();
            const task = tasks.find(t => t.id === taskId);
            
            if (task) {
                task.completed = !task.completed;
                saveTasks(tasks);
                renderTasks();
                updateStats();
                
                if (task.completed) {
                    trackProductivity('task');
                    showNotification('Great job! Task completed! 🎉');
                }
            }
        }

        function deleteTask(taskId) {
            const tasks = getTasks();
            const filtered = tasks.filter(t => t.id !== taskId);
            saveTasks(filtered);
            renderTasks();
            updateStats();
        }

        function renderTasks() {
            const tasks = getTasks();
            const taskList = document.getElementById('taskList');
            
            if (tasks.length === 0) {
                taskList.innerHTML = '<p class="text-gray-500 text-center py-8">No tasks yet. Add one to get started!</p>';
                return;
            }
            
            taskList.innerHTML = tasks.map(task => {
                const categoryColors = {
                    'High': 'bg-red-500/20 text-red-400',
                    'Medium': 'bg-yellow-500/20 text-yellow-400',
                    'Low': 'bg-green-500/20 text-green-400'
                };
                
                return `
                    <li class="animate-fade-in-up">
                        <div class="flex items-center justify-between bg-neutral-900 text-white rounded-lg p-3 border border-gray-800 hover:border-purple-500 transition-all transform hover:translate-x-1 ${task.completed ? 'opacity-50' : ''}">
                            <div onclick="toggleTask(${task.id})" class="flex items-center gap-3 cursor-pointer flex-1">
                                <div class="w-5 h-5 rounded-full border-2 border-purple-500 flex items-center justify-center ${task.completed ? 'bg-purple-600' : ''}">
                                    ${task.completed ? '<span class="text-white text-xs">✓</span>' : ''}
                                </div>
                                <p class="${task.completed ? 'line-through text-gray-500' : ''}">${task.text}</p>
                            </div>
                            
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-semibold px-3 py-1 rounded-full ${categoryColors[task.category]}">${task.category.toUpperCase()}</span>
                                <button onclick="deleteTask(${task.id})" class="text-red-500 hover:text-red-600 p-1">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function getTasks() {
            return JSON.parse(localStorage.getItem('tasks') || '[]');
        }

        function saveTasks(tasks) {
            localStorage.setItem('tasks', JSON.stringify(tasks));
        }

        function loadTasks() {
            renderTasks();
        }

        
        function changeTime(element) {
            const time = document.getElementById('time');
            
            if (element.id === "focus") {
                time.textContent = "25:00";
                totalSeconds = 1500;
            } else if (element.id === "shortBreak") {
                time.textContent = "05:00";
                totalSeconds = 300;
            } else if (element.id === "longBreak") {
                time.textContent = "15:00";
                totalSeconds = 900;
            }
        }

        function setActive(element) {
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('bg-purple-600', 'text-white');
            });
            element.classList.add('bg-purple-600', 'text-white');
        }

        function updateDisplay() {
            const time = document.getElementById('time');
            const minutes = Math.floor(totalSeconds / 60);
            let seconds = totalSeconds % 60;
            
            seconds = seconds < 10 ? "0" + seconds : seconds;
            time.textContent = `${minutes}:${seconds}`;
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            const startMode = document.querySelector('.tab.bg-purple-600').id;
            
            timer = setInterval(() => {
                if (totalSeconds > 0) {
                    totalSeconds--;
                    updateDisplay();
                } else {
                    clearInterval(timer);
                    isRunning = false;
                    
                    if (startMode === 'focus') {
                        stats.focusSessions++;
                        stats.minutesFocused += 25;
                        trackProductivity('session');
                        updateStats();
                        saveStats();
                        showNotification('Focus session complete! Take a break! 🎉');
                    } else {
                        showNotification('Break time over! Ready for another focus session?');
                    }
                }
            }, 1000);
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timer);
        }

        function resetTimer() {
            pauseTimer();
            const activeTab = document.querySelector('.tab.bg-purple-600').id;
            changeTime(document.getElementById(activeTab));
        }

        
        function updateStats() {
            const tasks = getTasks();
            const completed = tasks.filter(t => t.completed).length;
            const total = tasks.length;
            const productivity = total > 0 ? Math.round((completed / total) * 100) : 0;
            
            stats.tasksCompleted = completed;
            stats.totalTasks = total;
            
            document.getElementById('tasksCompleted').textContent = completed;
            document.getElementById('focusSessions').textContent = stats.focusSessions;
            document.getElementById('minutesFocused').textContent = stats.minutesFocused;
            document.getElementById('productivity').textContent = productivity + '%';
            
            const progress = total > 0 ? (completed / total) * 100 : 0;
            document.getElementById('taskProgress').style.width = progress + '%';
            
            saveStats();
        }

        function saveStats() {
            localStorage.setItem('stats', JSON.stringify(stats));
        }

        function loadStats() {
            const saved = localStorage.getItem('stats');
            if (saved) {
                stats = JSON.parse(saved);
            }
        }

        
        const notesArea = document.getElementById('notesArea');
        notesArea.addEventListener('input', function() {
            localStorage.setItem('notes', notesArea.value);
        });

        function loadNotes() {
            const notes = localStorage.getItem('notes');
            if (notes) {
                notesArea.value = notes;
            }
        }

        
        function initChart() {
            const ctx = document.getElementById('productivityChart').getContext('2d');
            
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Tasks Completed',
                        data: [],
                        borderColor: '#9333ea',
                        backgroundColor: 'rgba(147, 51, 234, 0.15)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointBackgroundColor: '#9333ea',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }, {
                        label: 'Focus Sessions',
                        data: [],
                        borderColor: '#a855f7',
                        backgroundColor: 'rgba(168, 85, 247, 0.15)',
                        borderWidth: 3,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        pointBackgroundColor: '#a855f7',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: true,
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 20,
                                font: {
                                    size: 14,
                                    family: 'Quicksand'
                                },
                                color: '#9ca3af'
                            }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.9)',
                            padding: 12,
                            titleFont: {
                                size: 14,
                                family: 'Quicksand'
                            },
                            bodyFont: {
                                size: 13,
                                family: 'Quicksand'
                            },
                            borderColor: '#9333ea',
                            borderWidth: 2,
                            displayColors: true
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                stepSize: 1,
                                font: {
                                    size: 12,
                                    family: 'Quicksand'
                                },
                                color: '#9ca3af'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            }
                        },
                        x: {
                            ticks: {
                                font: {
                                    size: 12,
                                    family: 'Quicksand'
                                },
                                color: '#9ca3af'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                drawBorder: false
                            }
                        }
                    },
                    animation: {
                        duration: 750,
                        easing: 'easeInOutQuart'
                    }
                }
            });
            
            updateChartData();
        }

        function updateChartView(view) {
            currentChartView = view;
            
            document.querySelectorAll('.chart-filter').forEach(btn => {
                btn.classList.remove('bg-purple-600', 'text-white');
                btn.classList.add('bg-neutral-800', 'border', 'border-gray-700');
            });
            event.target.classList.remove('bg-neutral-800', 'border', 'border-gray-700');
            event.target.classList.add('bg-purple-600', 'text-white');
            
            updateChartData();
        }

        function updateChartData() {
            let labels = [];
            let taskData = [];
            let focusData = [];

            if (currentChartView === 'hourly') {
                const now = new Date();
                for (let i = 11; i >= 0; i--) {
                    const hour = new Date(now.getTime() - i * 60 * 60 * 1000);
                    const hourLabel = hour.getHours() + ':00';
                    labels.push(hourLabel);
                    
                    const hourData = productivityData.hourly.find(d => d.hour === hourLabel);
                    taskData.push(hourData ? hourData.tasks : 0);
                    focusData.push(hourData ? hourData.sessions : 0);
                }
            } else if (currentChartView === 'daily') {
                const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const now = new Date();
                for (let i = 6; i >= 0; i--) {
                    const day = new Date(now.getTime() - i * 24 * 60 * 60 * 1000);
                    const dayLabel = days[day.getDay()];
                    labels.push(dayLabel);
                    
                    const dayData = productivityData.daily.find(d => d.day === dayLabel);
                    taskData.push(dayData ? dayData.tasks : 0);
                    focusData.push(dayData ? dayData.sessions : 0);
                }
            } else if (currentChartView === 'weekly') {
                labels = ['Week 1', 'Week 2', 'Week 3', 'Week 4'];
                productivityData.weekly.forEach(week => {
                    taskData.push(week.tasks);
                    focusData.push(week.sessions);
                });
            }

            chart.data.labels = labels;
            chart.data.datasets[0].data = taskData;
            chart.data.datasets[1].data = focusData;
            chart.update();
        }

        function trackProductivity(type) {
            const now = new Date();
            const hour = now.getHours() + ':00';
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const day = days[now.getDay()];

            let hourlyEntry = productivityData.hourly.find(d => d.hour === hour);
            if (!hourlyEntry) {
                hourlyEntry = { hour, tasks: 0, sessions: 0 };
                productivityData.hourly.push(hourlyEntry);
            }
            
            if (type === 'task') hourlyEntry.tasks++;
            if (type === 'session') hourlyEntry.sessions++;

            let dailyEntry = productivityData.daily.find(d => d.day === day);
            if (!dailyEntry) {
                dailyEntry = { day, tasks: 0, sessions: 0 };
                productivityData.daily.push(dailyEntry);
            }
            
            if (type === 'task') dailyEntry.tasks++;
            if (type === 'session') dailyEntry.sessions++;

            if (productivityData.hourly.length > 24) {
                productivityData.hourly = productivityData.hourly.slice(-24);
            }

            saveProductivityData();
            updateChartData();
        }

        function saveProductivityData() {
            localStorage.setItem('productivityData', JSON.stringify(productivityData));
        }

        function loadProductivityData() {
            const saved = localStorage.getItem('productivityData');
            if (saved) {
                productivityData = JSON.parse(saved);
            } else {
                productivityData = {
                    hourly: [],
                    daily: [],
                    weekly: [
                        { tasks: 4, sessions: 2 },
                        { tasks: 7, sessions: 4 },
                        { tasks: 5, sessions: 3 },
                        { tasks: 0, sessions: 0 }
                    ]
                };
            }
        }

        
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `fixed top-4 right-4 z-50 px-6 py-3 rounded-lg shadow-2xl border ${
                type === 'success' 
                    ? 'bg-green-900 border-green-600 text-green-100' 
                    : 'bg-red-900 border-red-600 text-red-100'
            } animate-fade-in-up`;
            notification.textContent = message;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        function clearAllData() {
            if (confirm('Are you sure you want to clear all data? This cannot be undone!')) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
